version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - dogsled
    - errcheck
    - gochecknoinits
    - gocritic
    - gomodguard
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    misspell:
      locale: US
    gosec:
      excludes:
        # G115 (integer overflow on conversion) is too noisy: it flags many
        # safe conversions in serialization and utility code (protobuf message
        # lengths, unix timestamps, peer counts, ...).
        - G115
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.gen\.go$
      - _test\.go$
      - testing.go$
      - .*doc\.go$
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(berty.tech)
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.gen\.go$
      - _test\.go$
      - testing.go$
      - .*doc\.go$
      - third_party$
      - builtin$
      - examples$
